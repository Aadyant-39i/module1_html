<!DOCTYPE html>
<html>
    <head>
        <style>
            div{
                right: 30px;
                border: 3px solid #73ad21;

            }
            div.absolute{
                position: absolute;
                left: 50px;
                border: 3px solid #20ad56;

            }
            div.relative{
                position: relative;
                left: 100px;
                border: 3px solid #ad5056;
            }
                div.fixed{
                    position: fixed;
                    top: 0;
                    right: 20px;
                    width: 300px;
                    border: 3px solid #5544fd;

                }
                div.sticky{
                    position: sticky;
                    top: 1px;
                    left: 20px;
                    width: 100px;
                    border: 3px solid #16e6b5c9;

                }
        </style>
    </head>
    <body>
        <h2>Positioning</h2>
        <div>div with no positioning property</div>
        <div class="sticky">Div with sticky positioning property</div>
        <div class="relative">Div with relative property</div>
        <div class="absolute">absolute class DIV</div>
        <div class="fixed">Fixed positioning property</div>
        <br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br>

        
    </body>
</html>
