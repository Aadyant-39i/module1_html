<!DOCTYPE html>
<html>
    <head>
        <title>
            Registration Form
        </title>
    </head>
    <body bgcolor="black">
        <font color="white">
        <h1>Registration form</h1>
        <form

oninput = "x.value=(parseInt(m1.value)+parseInt(m2.value)+parseInt(m3.value))/3">
            <fieldset>
                <legend>Personal details</legend>
                <label>Name:</label><br>
                <input type="text"><br>
                <label>Email:</label><br>
                <input type="email"><br>
                <label>Password:</label><br>
                <input type="password"><br>
                <label>Age:</label><br>
                <input type="number"><br>
                <label>Phone number:</label><br>
                <input type="tel"><br>
                <label>Address</label><br>
                <textarea></textarea><br>
                <label>Gender:</label><br>
                <input type='radio' name='gender' value="male" > Male<br>
                <input type='radio' name='gender' value="female" > Female<br>
                <input type='radio' name='gender' value="other" > Other<br>
                <label>DOB:</label><br>
                <input type="date"><br>
                <label>Nationality:</label><br>
                <select>
                    <option value="india">India</option>
                    <option value="usa">USA</option>
                    <option value="uk">UK</option>
                    <option value="australia">Australia</option>
                </select>


            </fieldset>
            <fieldset>
                <legend>Academic details</legend>
                <select name="subject" id="subject1">
                    <option value="maths">Maths</option>
                    <option value="physics">Physics</option>
                    <option value="chemistry">Chemistry</option>
                    <option value="english">English</option>
                </select>
                <input type="number" id="m1" name="m1"><br>
                <select name="subject" id="subject2">
                    <option value="maths">Maths</option>
                    <option value="physics">Physics</option>
                    <option value="chemistry">Chemistry</option>
                    <option value="english">English</option>
                </select>
                <input type="number" id="m2" name="m2"><br>
                <select name="subject" id="subject3">
                    <option value="maths">Maths</option>
                    <option value="physics">Physics</option>
                    <option value="chemistry">Chemistry</option>
                    <option value="english">English</option>
                </select>
                <input type="number" id="m3" name="m3"><br>
                <label>Average:</label><br>
                <output name="x" for="m1 m2 m3"></output>
            </fieldset>
        </form>
        </font>
    </body>
</html>
