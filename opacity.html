<!DOCTYPE html>
<html>
    <head>
        <style>
            div{
                background-color: #0e0e7e97;
                padding: 10px;
            }
            div.first{
                opacity: 0.1;
            }
            div.second{
                opacity: 0.333;
            }
            div.third{
                opacity: 0.6;
            }
            div.fourth{
                opacity: 0.8;
            }
        </style>
    </head>
    <body>
        <h1>Opacity</h1>
        <p>Opacity property:</p>
        <div class="first">This is how opacity 0.1 looks like!</div>
        <div class="second">This is how opacity 0.333 looks like!</div>
        <div class="third">This is how opacity 0.6 looks like!</div>
        <div class="fourth">This is how opacity 0.8 looks like!</div>
    </body>
</html>
